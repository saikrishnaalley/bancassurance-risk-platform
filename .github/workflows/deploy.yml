name: Deploy to Salesforce

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Write JWT key to file
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" | base64 --decode > server.key
          echo "--- key file line count ---"
          wc -l server.key

      - name: Authenticate to Salesforce via JWT
        run: |
          sf org login jwt \
            --client-id ${{ secrets.SF_CONSUMER_KEY }} \
            --jwt-key-file server.key \
            --username ${{ secrets.SF_USERNAME }} \
            --instance-url ${{ secrets.SF_INSTANCE_URL }} \
            --alias riskorg \
            --set-default

      - name: Deploy source to org
        run: sf project deploy start --target-org riskorg --ignore-conflicts

      - name: Run Apex tests
        run: sf apex run test --target-org riskorg --test-level RunLocalTests --result-format human --wait 20
        continue-on-error: true

      - name: Clean up key file
        if: always()
        run: rm -f server.key