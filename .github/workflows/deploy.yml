name: Deploy to Salesforce

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > ./SFDX_AUTH_URL.txt
          sf org login sfdx-url --sfdx-url-file ./SFDX_AUTH_URL.txt --alias deployOrg --set-default

      - name: Deploy metadata
        run: sf project deploy start --target-org deployOrg --ignore-conflicts

      - name: Run Apex tests
        run: sf apex run test --target-org deployOrg --code-coverage --result-format human --wait 10
        continue-on-error: true